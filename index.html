<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mars — Menü</title>

<script>
const CONFIG = {
  // 1) Опубликованная Google-таблица как CSV.
  //    Файл → Поделиться → Опубликовать в интернете → выбрать лист → CSV → скопировать ссылку.
  sheetCsvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSG6WOozKlWkar6WL166Yf0E6_W2nd7LNoUnJdbnpyKK5kgDRlTgHz8asWmLDb6nt0zPbiJvxkTn7-z/pub?gid=0&single=true&output=csv",

  currency: "₺",
  currencyAfter: true,
  defaultLang: "tr"
};

const GROUPS = [
  { key_tr: "Kahve",     key_en: "Coffee"   },
  { key_tr: "İçecekler", key_en: "Drinks"   },
  { key_tr: "Yemekler",  key_en: "Food"     },
  { key_tr: "Tatlılar",  key_en: "Desserts" },
];
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200;12..96,300;12..96,400;12..96,500;12..96,600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }

:root {
  --gold:        #D4B57E;
  --gold-light:  #ECD5A4;
  --gold-dim:    rgba(212,181,126,0.14);
  --gold-border: rgba(212,181,126,0.22);
  --bg:          #111111;
  --surface:     #1d1813;
  --ink:         #ffffff;
  --muted:       rgba(255,255,255,0.38);
  --line:        rgba(255,255,255,0.07);
  --font: 'Bricolage Grotesque', system-ui, -apple-system, sans-serif;
  --max: 540px;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(212,181,126,0.07) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

.wrap {
  position: relative; z-index: 1;
  max-width: var(--max); margin: 0 auto;
  padding: 0 16px 80px;
}

/* ======== HEADER ======== */
header {
  position: sticky; top: 0; z-index: 40;
  height: var(--header-h, 53px);
  max-width: var(--max); margin: 0 auto;
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter: blur(12px) saturate(1.2);
  padding: 12px 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--gold-border);
  gap: 12px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; color: var(--ink); flex: 0 0 auto;
}
.brand img { height: 28px; width: auto; display: block; }
.brand-name {
  font-size: 22px; font-weight: 500; letter-spacing: .06em;
  text-transform: uppercase; line-height: 1; margin: 0;
  color: #fff;
}




/* ======== GROUP TABS ======== */
nav.groups {
  position: sticky; top: var(--header-h, 53px); z-index: 30;
  margin: 0 -16px;
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(212,181,126,0.18);
  display: flex; overflow-x: auto; scrollbar-width: none;
}
nav.groups::-webkit-scrollbar { display: none; }
nav.groups button {
  flex: 1; background: transparent; border: 0;
  font-family: var(--font); font-weight: 400; font-size: 12px;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--muted); padding: 12px 8px 10px;
  cursor: pointer; white-space: nowrap; line-height: 1;
  border-bottom: 1.5px solid transparent; margin-bottom: -1px;
  transition: color .15s, border-color .15s;
  min-width: 0;
}
nav.groups button.active { color: var(--gold); border-bottom-color: var(--gold-light); }

/* ======== ITEMS ======== */
section.cat { padding-top: 24px; scroll-margin-top: 100px; }

.item {
  display: flex; gap: 14px; padding: 14px 0;
  border-bottom: 1px solid var(--line); align-items: flex-start;
}
.item.sold { opacity: .38; }

.thumb-wrap {
  width: 72px; height: 72px; flex: 0 0 auto;
  position: relative; cursor: pointer;
}
.thumb-wrap img,
.thumb-wrap .ph {
  width: 72px; height: 72px; border-radius: 12px;
  object-fit: cover; display: block;
}
.thumb-wrap .ph {
  background: var(--surface);
  border: 1px solid var(--gold-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 300; color: var(--gold);
  letter-spacing: .05em;
}
.zoom-hint {
  position: absolute; bottom: 4px; right: 4px;
  background: rgba(0,0,0,.55); border-radius: 5px;
  padding: 3px; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s; pointer-events: none;
}
.thumb-wrap:hover .zoom-hint,
.thumb-wrap:focus .zoom-hint { opacity: 1; }
.zoom-hint svg { width: 10px; height: 10px; color: #fff; }

.item-body { flex: 1; min-width: 0; }
.item-top { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
.item-name { font-weight: 500; font-size: 15px; margin: 0; line-height: 1.3; color: #fff; }
.price {
  font-weight: 500; font-size: 15px; white-space: nowrap;
  color: var(--gold-light); font-variant-numeric: tabular-nums; flex: 0 0 auto;
}
.desc { color: var(--muted); font-size: 13px; margin: 3px 0 0; line-height: 1.4; }
.tag {
  display: inline-block; margin-top: 5px; font-size: 10px; font-weight: 500;
  color: var(--muted); border: 1px solid var(--gold-border);
  padding: 2px 8px; border-radius: 6px;
  text-transform: uppercase; letter-spacing: .5px;
}

/* ======== LIGHTBOX ======== */
#lightbox {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.92); backdrop-filter: blur(6px);
  align-items: center; justify-content: center; padding: 20px;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: min(480px, 100%); max-height: 80dvh;
  border-radius: 16px; object-fit: contain;
  box-shadow: 0 32px 80px rgba(0,0,0,.8);
  border: 1px solid var(--gold-border);
}
#lightbox-close {
  position: absolute; top: 16px; right: 16px;
  background: rgba(255,255,255,.08);
  border: 1px solid var(--gold-border);
  border-radius: 999px; color: #fff; font-size: 18px;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-family: var(--font);
}
#lightbox-caption {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  color: var(--muted); font-size: 13px; text-align: center;
  white-space: nowrap; max-width: 90%;
  overflow: hidden; text-overflow: ellipsis;
}

/* ======== MISC ======== */
.state { text-align: center; color: var(--muted); padding: 48px 16px; font-size: 14px; }
.ribbon {
  margin-top: 16px; font-size: 12px; color: var(--gold);
  border: 1px solid var(--gold-border); border-radius: 8px;
  padding: 7px 12px; text-align: center;
}
footer { text-align: center; color: var(--muted); font-size: 12px; padding-top: 32px; }

@media (prefers-reduced-motion: no-preference) { html { scroll-behavior: smooth; } }
</style>
</head>
<body>

<div id="lightbox" role="dialog" aria-modal="true" aria-label="Photo">
  <button id="lightbox-close" aria-label="Close">✕</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-caption"></div>
</div>

<header>
  <a class="brand" href="https://marsespresso.com" aria-label="Mars">
    <img src="mars_transparent.png" alt="Mars"
         onerror="this.style.display='none';document.getElementById('brand-fallback').style.display='block'">
    <span class="brand-name" id="brand-fallback" style="display:none">Mars</span>
  </a>

</header>

<div class="wrap">
  <nav class="groups" id="groupnav" aria-label="Menu groups"></nav>
  <main id="menu"><p class="state">Yükleniyor… / Loading…</p></main>
  <footer id="footer"></footer>
</div>

<script>
const T = {
  empty:   { tr:"Menü yakında.", en:"Menu coming soon." },
  sold:    { tr:"Tükendi", en:"Sold out" },
  error:   { tr:"Menü yüklenemedi.", en:"Couldn't load menu." },
  sample:  { tr:"Örnek veriler — Google E-Tablonuzu bağlayın.", en:"Sample data — connect your Google Sheet." }
};

const urlLang = new URLSearchParams(window.location.search).get('lang');
let LANG = urlLang === 'en' ? 'en' : (urlLang === 'tr' ? 'tr' : (CONFIG.defaultLang === 'en' ? 'en' : 'tr'));
let ITEMS = [];
let ACTIVE_GROUP = 0;
let USING_SAMPLE = false;

const SAMPLE = [
  {group_tr:"İçecekler",group_en:"Drinks",name_tr:"Flat White",name_en:"Flat White",description_tr:"Çift shot, kadifemsi süt",description_en:"Double shot, velvety milk",price:"95",photo:"https://images.unsplash.com/photo-1517256064527-09c73fc73e38?w=300&q=75",available:"TRUE"},
  {group_tr:"İçecekler",group_en:"Drinks",name_tr:"V60 Filtre",name_en:"V60 Filter",description_tr:"Tek menşe, dönüşümlü",description_en:"Single origin, rotating",price:"75",photo:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=75",available:"TRUE"},
  {group_tr:"İçecekler",group_en:"Drinks",name_tr:"Buzlu Latte",name_en:"Iced Latte",description_tr:"",description_en:"",price:"90",photo:"",available:"FALSE"},
  {group_tr:"İçecekler",group_en:"Drinks",name_tr:"Demlik Çay",name_en:"Turkish Tea",description_tr:"Klasik demlik",description_en:"Classic brew",price:"45",photo:"",available:"TRUE"},
  {group_tr:"İçecekler",group_en:"Drinks",name_tr:"Limonata",name_en:"Lemonade",description_tr:"Taze sıkılmış",description_en:"Freshly squeezed",price:"80",photo:"https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=300&q=75",available:"TRUE"},
  {group_tr:"Yemekler",group_en:"Food",name_tr:"Antep Fıstıklı Kruvasan",name_en:"Pistachio Croissant",description_tr:"Bu sabah pişti",description_en:"Baked this morning",price:"110",photo:"https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=300&q=75",available:"TRUE"},
  {group_tr:"Yemekler",group_en:"Food",name_tr:"Peynirli Tost",name_en:"Cheese Toast",description_tr:"",description_en:"",price:"85",photo:"",available:"TRUE"},
  {group_tr:"Tatlılar",group_en:"Desserts",name_tr:"Cheesecake",name_en:"Cheesecake",description_tr:"San Sebastian usulü",description_en:"Burnt Basque style",price:"130",photo:"https://images.unsplash.com/photo-1473427822047-b7de3e28e8e6?w=300&q=75",available:"TRUE"},
  {group_tr:"Tatlılar",group_en:"Desserts",name_tr:"Brownie",name_en:"Brownie",description_tr:"Belçika çikolatasıyla",description_en:"Belgian chocolate",price:"95",photo:"",available:"TRUE"},
];

function pick(it, base) {
  const v = (it[base+"_"+LANG]||"").trim();
  return v || (it[base+"_"+(LANG==="tr"?"en":"tr")]||"").trim();
}
function fmtPrice(p) {
  const v = (p||"").trim();
  if (!v) return "";
  return /^\d+([.,]\d+)?$/.test(v)
    ? (CONFIG.currencyAfter ? v+" "+CONFIG.currency : CONFIG.currency+v) : v;
}
function slug(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,""); }
function esc(s) { return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function isAvail(v) { const s=(v||"").trim().toLowerCase(); return s!=="false"&&s!=="0"&&s!=="no"&&s!=="hayır"; }

function parseCSV(text) {
  const rows=[]; let row=[], f="", q=false;
  for (let i=0;i<text.length;i++) {
    const c=text[i];
    if (q) { if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c; }
    else { if(c==='"')q=true; else if(c===','){row.push(f);f="";}
      else if(c==='\n'){row.push(f);rows.push(row);row=[];f="";}
      else if(c!=='\r')f+=c; }
  }
  if(f.length||row.length){row.push(f);rows.push(row);}
  if(!rows.length)return[];
  const headers=rows[0].map(h=>h.trim().toLowerCase());
  return rows.slice(1).filter(r=>r.some(c=>c.trim()!==""))
    .map(r=>{const o={};headers.forEach((h,i)=>o[h]=(r[i]||"").trim());return o;});
}

/* lightbox */
const lb=document.getElementById("lightbox");
const lbImg=document.getElementById("lightbox-img");
const lbCap=document.getElementById("lightbox-caption");
document.getElementById("lightbox-close").addEventListener("click",closeLB);
lb.addEventListener("click",e=>{if(e.target===lb)closeLB();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeLB();});
function openLB(src,caption){lbImg.src=src;lbCap.textContent=caption||"";lb.classList.add("open");document.body.style.overflow="hidden";}
function closeLB(){lb.classList.remove("open");document.body.style.overflow="";lbImg.src="";}

function getGroupItems() {
  const g = GROUPS[ACTIVE_GROUP];
  const key = LANG==="tr" ? g.key_tr : g.key_en;
  return ITEMS.filter(it => {
    const v = pick(it,"group");
    if (!v && ACTIVE_GROUP===GROUPS.length-1) return true;
    return v === key;
  });
}

function render() {
  document.getElementById("groupnav").innerHTML = GROUPS.map((g,i) => {
    const label = LANG==="tr" ? g.key_tr : g.key_en;
    return `<button onclick="switchGroup(${i})" class="${i===ACTIVE_GROUP?'active':''}">${esc(label)}</button>`;
  }).join("");

  renderPanel();
}

function renderPanel() {
  const menu = document.getElementById("menu");
  const items = getGroupItems();

  if (!items.length) {
    menu.innerHTML = `<p class="state">${esc(T.empty[LANG])}</p>`;
    if (USING_SAMPLE) menu.insertAdjacentHTML("beforeend",`<p class="ribbon">${esc(T.sample[LANG])}</p>`);
    return;
  }

  const zoomIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg>`;

  menu.innerHTML = `<section class="cat">${items.map(it => {
    const name  = esc(pick(it,"name"));
    const desc  = esc(pick(it,"description"));
    const price = esc(fmtPrice(it.price));
    const sold  = !isAvail(it.available);
    const photo = (it.photo||"").trim();

    const thumb = photo
      ? `<div class="thumb-wrap" role="button" tabindex="0"
           onclick="openLB('${esc(photo)}','${name}')"
           onkeydown="if(event.key==='Enter')openLB('${esc(photo)}','${name}')">
           <img src="${esc(photo)}" alt="${name}" loading="lazy"
                onerror="this.parentElement.innerHTML='<div class=\\'ph\\'>${esc((pick(it,'name')||'•')[0])}</div>'">
           <div class="zoom-hint" aria-hidden="true">${zoomIcon}</div>
         </div>`
      : `<div class="thumb-wrap" style="cursor:default"><div class="ph">${esc((pick(it,"name")||"•")[0])}</div></div>`;

    return `<div class="item${sold?' sold':''}">
      ${thumb}
      <div class="item-body">
        <div class="item-top">
          <p class="item-name">${name}</p>
          ${price?`<span class="price">${price}</span>`:""}
        </div>
        ${desc?`<p class="desc">${desc}</p>`:""}
        ${sold?`<span class="tag">${esc(T.sold[LANG])}</span>`:""}
      </div>
    </div>`;
  }).join("")}</section>`;

  if (USING_SAMPLE) menu.insertAdjacentHTML("beforeend",`<p class="ribbon">${esc(T.sample[LANG])}</p>`);
  document.getElementById("footer").innerHTML = `Mars · ${new Date().getFullYear()}`;
}

function switchGroup(idx) {
  ACTIVE_GROUP = idx;
  document.querySelectorAll("nav.groups button").forEach((b,i)=>b.classList.toggle("active",i===idx));
  window.scrollTo({top:0,behavior:"instant"});
  renderPanel();
}


async function load() {
  if (!CONFIG.sheetCsvUrl) { ITEMS=SAMPLE; USING_SAMPLE=true; render(); return; }
  try {
    const res = await fetch(CONFIG.sheetCsvUrl);
    if (!res.ok) throw new Error("HTTP "+res.status);
    ITEMS = parseCSV(await res.text());
    USING_SAMPLE = false;
    render();
  } catch(err) {
    document.getElementById("menu").innerHTML=`<p class="state">${esc(T.error[LANG])}</p>`;
    console.error(err);
  }
}
// Точно измеряем высоту хедера и передаём в CSS
function syncHeaderHeight() {
  const h = document.querySelector('header').getBoundingClientRect().height;
  document.documentElement.style.setProperty('--header-h', h + 'px');
}
syncHeaderHeight();
window.addEventListener('resize', syncHeaderHeight);

load();
</script>
</body>
</html>
